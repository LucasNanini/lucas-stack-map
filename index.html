<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f8f6; overflow: hidden; display: flex; }

  #canvas { width: 100%; height: 100%; display: block; }

  .node rect {
    rx: 6; ry: 6;
    stroke-width: 1.5;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .node text {
    font-size: 11px;
    font-weight: 600;
    pointer-events: none;
    fill: #fff;
  }
  .node .subtext {
    font-size: 9px;
    font-weight: 400;
    fill: rgba(255,255,255,0.75);
  }
  .node.dimmed { opacity: 0.15; }
  .node.highlighted rect { stroke: #fff; stroke-width: 2.5; }

  .link {
    fill: none;
    stroke: #ccc;
    stroke-width: 1.5;
    opacity: 0.6;
  }
  .link.highlighted { stroke: #444; opacity: 1; stroke-width: 2; }

    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    fill: #aaa;

    position: fixed;
    background: #1a1a18;
    color: #e8e6e0;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 12px;
    max-width: 240px;
    pointer-events: none;
    display: none;
    line-height: 1.6;

  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.9);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(0,0,0,0.1);
    font-size: 11px;
    color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #aaa;
    background: rgba(255,255,255,0.85);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(0,0,0,0.08);
  }

  #panel {
    width: 300px;
    min-width: 300px;
    height: 100vh;
    background: #fff;
    border-left: 1px solid rgba(0,0,0,0.10);
    padding: 20px 18px;
    overflow-y: auto;
    font-size: 13px;
    color: #1a1a18;
    display: flex;
    flex-direction: column;
  }
  #panel-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #bbb;
    font-size: 12px;
    line-height: 1.6;
  }
  #panel-content { display: none; }
  #panel.has-content #panel-empty { display: none; }
  #panel.has-content #panel-content { display: block; }
  #panel-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; font-size: 18px;
    color: #ccc; cursor: pointer; line-height: 1;
  }
  #panel-close:hover { color: #888; }
  #panel h2 { font-size: 18px; margin-bottom: 2px; }

  #panel li { margin-bottom: 5px; line-height: 1.5; }
  #panel a { color: #185fa5; text-decoration: none; }
  #panel a:hover { text-decoration: underline; }
  #panel .p-open-note {

<script>
const NODE_W = 150;
const NODE_H = 44;

// Data is embedded below (injected from stack.json by build.py) so the file
// works when opened directly via file://. Falls back to fetch if not embedded.
if (window.STACK_DATA) {
  const { layers, nodes, edges } = window.STACK_DATA;
  render(layers, nodes, edges);
} else {
  fetch("stack.json").then(r => r.json())
    .then(({ layers, nodes, edges }) => render(layers, nodes, edges))
    .catch(e => document.body.innerHTML = `<p style="padding:2rem;font-family:sans-serif;color:red">Could not load stack.json: ${e}</p>`);
}

async function render(LAYERS, NODES, EDGES) {
  const LAYER_COLOR = Object.fromEntries(LAYERS.map(l => [l.id, l.color]));
  const LAYER_ORDER = LAYERS.map(l => l.id);
  const nodeById = Object.fromEntries(NODES.map(n => [n.id, n]));

  // Drop any edges that reference unknown nodes (keeps ELK from throwing)
  const allEdges = EDGES.filter(e => nodeById[e.source] && nodeById[e.target]);
  // Split into three groups:
  // 1. forward cross-layer edges → ELK (left-to-right flow)
  // 2. same-layer edges → manual bracket routing
  // 3. backward edges (projects→tools, right-to-left) → manual curved arcs
  const LAYER_IDX = Object.fromEntries(LAYER_ORDER.map((l,i) => [l,i]));
  const edges     = allEdges.filter(e => {
    const si = LAYER_IDX[nodeById[e.source].layer], ti = LAYER_IDX[nodeById[e.target].layer];
    return si !== ti && si < ti; // forward only
  });
  const sameLayer = allEdges.filter(e => nodeById[e.source].layer === nodeById[e.target].layer);
  const backEdges = allEdges.filter(e => {
    const si = LAYER_IDX[nodeById[e.source].layer], ti = LAYER_IDX[nodeById[e.target].layer];
    return si > ti; // right-to-left (projects→tools)
  });

  // --- ELK layered layout with partitioning: one column per layer ---
  const elk = new ELK();
  const elkGraph = {
    id: "root",
    layoutOptions: {
      "elk.algorithm": "layered",
      "elk.direction": "RIGHT",
      "elk.edgeRouting": "ORTHOGONAL",
      "elk.partitioning.activate": "true",
      "elk.separateConnectedComponents": "false",
      "elk.layered.spacing.nodeNodeBetweenLayers": "130",
      "elk.spacing.nodeNode": "30",
      "elk.spacing.edgeEdge": "10",
      "elk.spacing.edgeNode": "14",
      "elk.layered.spacing.edgeEdgeBetweenLayers": "10",
      "elk.layered.spacing.edgeNodeBetweenLayers": "14",
      "elk.layered.crossingMinimization.semiInteractive": "true"
    },
    children: NODES.map(n => ({
      id: n.id, width: NODE_W, height: NODE_H,
      layoutOptions: { "elk.partitioning.partition": String(LAYER_ORDER.indexOf(n.layer)) }
    })),
    edges: edges.map((e, i) => ({ id: "e" + i, sources: [e.source], targets: [e.target] }))
  };

  const laid = await elk.layout(elkGraph);

  // Map ELK results back onto our nodes
  laid.children.forEach(c => {
    const n = nodeById[c.id];
    n.x = c.x; n.y = c.y;
  });

  const mapArea = document.getElementById("map-area");
  const W = mapArea.clientWidth || window.innerWidth - 300;
  const H = window.innerHeight;
  const svg = d3.select("#canvas").attr("width", W).attr("height", H);
  const g = svg.append("g");
  const zoom = d3.zoom().scaleExtent([0.15, 2.5]).on("zoom", e => g.attr("transform", e.transform));
  svg.call(zoom);

  // --- Layer column labels (computed from laid-out node positions) ---
  const colX = {};
  NODES.forEach(n => {
    if (colX[n.layer] === undefined) colX[n.layer] = n.x;
    else colX[n.layer] = Math.min(colX[n.layer], n.x);
  });
  const topY = Math.min(...NODES.map(n => n.y)) - 34;
  const botY = Math.max(...NODES.map(n => n.y + NODE_H)) + 20;
  LAYER_ORDER.forEach(lid => {
    const layer = LAYERS.find(l => l.id === lid);
    const x = colX[lid] + NODE_W / 2;
    g.append("text").attr("class", "layer-label")
      .attr("x", x).attr("y", topY).attr("text-anchor", "middle")
      .attr("fill", layer.color).text(layer.label);
  });

  // --- Edges from ELK orthogonal sections ---
  const edgePath = ledge => {
    const sec = ledge.sections && ledge.sections[0];
    if (!sec) return "";
    const pts = [sec.startPoint, ...(sec.bendPoints || []), sec.endPoint];
    return pts.map((p, i) => `${i ? "L" : "M"}${p.x},${p.y}`).join(" ");
  };

  const link = g.selectAll(".link")
    .data(laid.edges).enter()
    .append("path")
    .attr("class", "link")
    .attr("d", edgePath)
    .each(function (d, i) { d._src = edges[i].source; d._tgt = edges[i].target; });

  // Same-layer edges: route as a clean bracket on the LEFT side of the column.
  // Each gets its own lane so they don't overlap.
  const slLink = g.selectAll(".sl-link")
    .data(sameLayer).enter()
    .append("path")
    .attr("class", "link")
    .attr("d", (e, i) => {
      const s = nodeById[e.source], t = nodeById[e.target];
      const sy = s.y + NODE_H / 2, ty = t.y + NODE_H / 2;
      const lane = s.x - 14 - (i % 4) * 7;   // stagger lanes to the left of the column
      const sx = s.x, tx = t.x;
      return `M${sx},${sy} L${lane},${sy} L${lane},${ty} L${tx},${ty}`;
    })
    .each(function (e) { e._src = e.source; e._tgt = e.target; });

  // Back-edges (projects→tools): rendered as dashed curved arcs above the diagram.
  // Use a cubic bezier that loops above the top of the graph.
  const beLink = g.selectAll(".be-link")
    .data(backEdges).enter()
    .append("path")
    .attr("class", "link")
    .style("stroke", "#aaa")
    .style("stroke-dasharray", "4,3")
    .style("opacity", 0.5)
    .attr("d", e => {
      const s = nodeById[e.source], t = nodeById[e.target];
      const sx = s.x + NODE_W / 2, sy = s.y;
      const tx = t.x + NODE_W / 2, ty = t.y;
      const cy = Math.min(sy, ty) - 60; // arc above both nodes
      return `M${sx},${sy} C${sx},${cy} ${tx},${cy} ${tx},${ty}`;
    })
    .each(function(e) { e._src = e.source; e._tgt = e.target; });

  // --- Nodes ---
  const tooltip = document.getElementById("tooltip");
  const node = g.selectAll(".node")
    .data(NODES).enter()
    .append("g").attr("class", "node")
    .attr("transform", d => `translate(${d.x},${d.y})`);

  node.append("rect")
    .attr("width", NODE_W).attr("height", NODE_H)
    .attr("fill", d => LAYER_COLOR[d.layer])
    .attr("stroke", d => d3.color(LAYER_COLOR[d.layer]).darker(0.5));

  node.append("text")
    .attr("x", NODE_W / 2).attr("y", 18).attr("text-anchor", "middle")
    .text(d => d.name);
  node.append("text").attr("class", "subtext")
    .attr("x", NODE_W / 2).attr("y", 32).attr("text-anchor", "middle")
    .text(d => d.type);

  // --- Interaction ---
  const connectedIds = id => {
    const ids = new Set();
    allEdges.forEach(e => {
      if (e.source === id) ids.add(e.target);
      if (e.target === id) ids.add(e.source);
    });
    return ids;
  };
  // --- Detail panel ---
  const VAULT = "lucas-vault";
  const NOTE_DIR = "03-Work/Stack";
  const panel = document.getElementById("panel");
  const panelBody = document.getElementById("panel-body");
  const panelContent = document.getElementById("panel-content");
  const obsidianURI = name =>
    `obsidian://open?vault=${encodeURIComponent(VAULT)}&file=${encodeURIComponent(NOTE_DIR + "/" + name)}`;

  function openPanel(d) {
    const conn = [...connectedIds(d.id)].map(id => nodeById[id]).filter(Boolean);
    // Contents: plain descriptive bullets
    const contents = (d.items || [])
      .map(i => `<li>${typeof i === "string" ? i : i.label}</li>`).join("");
    // Documents: each row has up to two buttons — Open (doc) and Obsidian
    const docRow = doc => {
      const openBtn = doc.url
        ? `<a class="p-doc-btn" href="${doc.url}" target="_blank">Open ↗</a>` : "";
      const obsBtn = `<a class="p-doc-btn p-obs" href="${obsidianURI((doc.obsidian || d.name) + ".md")}">Obsidian</a>`;
      return `<li class="p-doc"><span class="p-doc-label">${doc.label}</span><span class="p-doc-btns">${openBtn}${obsBtn}</span></li>`;
    };
    const docs = (d.docs || []).map(docRow).join("");
    panelBody.innerHTML = `
      <h2>${d.name}</h2>
      <div class="p-type">${d.type}</div>
      ${d.detail ? `<div class="p-detail">${d.detail}</div>` : ""}
      <a class="p-open-note" href="${obsidianURI(d.name + ".md")}">Open note in Obsidian →</a>
      ${docs ? `<div class="p-section">Documents</div><ul class="p-doclist">${docs}</ul>` : ""}
      <div class="p-section">Contents</div>
      <ul>${contents}</ul>
      <div class="p-section">Connected to</div>
      <div>${conn.map(c => `<span class="p-conn">${c.name}</span>`).join("")}</div>
    `;
    panel.classList.add("has-content");
  }
  document.getElementById("panel-close").onclick = e => { e.stopPropagation(); panel.classList.remove("has-content"); clear(); };

  let active = null;
  const clear = () => {
    active = null;
    node.classed("dimmed", false).classed("highlighted", false);
    link.classed("highlighted", false).classed("dimmed", false);
    slLink.classed("highlighted", false).classed("dimmed", false);
    beLink.classed("highlighted", false).classed("dimmed", false);
    panel.classList.remove("has-content");
  };
  node.on("click", (event, d) => {
    event.stopPropagation();
    if (active === d.id) return clear();
    active = d.id;
    const conn = connectedIds(d.id);
    node.classed("dimmed", n => n.id !== d.id && !conn.has(n.id));
    node.classed("highlighted", n => conn.has(n.id) || n.id === d.id);
    link.classed("highlighted", e => e._src === d.id || e._tgt === d.id);
    link.classed("dimmed", e => e._src !== d.id && e._tgt !== d.id);
    slLink.classed("highlighted", e => e._src === d.id || e._tgt === d.id);
    slLink.classed("dimmed", e => e._src !== d.id && e._tgt !== d.id);
    beLink.classed("highlighted", e => e._src === d.id || e._tgt === d.id);
    beLink.classed("dimmed", e => e._src !== d.id && e._tgt !== d.id);
    openPanel(d);
  })
  .on("mouseover", (event, d) => {
    tooltip.style.display = "block";
    tooltip.innerHTML = `<strong>${d.name}</strong><div class="t-type">${d.type}</div><ul class="t-items">${d.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
  })
  .on("mousemove", event => {
    tooltip.style.left = (event.clientX + 14) + "px";
    tooltip.style.top = (event.clientY - 10) + "px";
  })
  .on("mouseout", () => { tooltip.style.display = "none"; });
  svg.on("click", clear);

  // --- Zoom to fit ---
  const minX = Math.min(...NODES.map(n => n.x)) - 20;
  const maxX = Math.max(...NODES.map(n => n.x + NODE_W)) + 20;
  const minY = topY - 10, maxY = botY;
  const bW = maxX - minX, bH = maxY - minY;
  const fitScale = Math.min(W / bW, (H - 80) / bH) * 0.94;
  const tx = (W - bW * fitScale) / 2 - minX * fitScale;
  const ty = (H - bH * fitScale) / 2 - minY * fitScale;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(fitScale));

  // --- Legend ---
  const legend = document.getElementById("legend");
  LAYERS.forEach(l => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<div class="legend-dot" style="background:${l.color}"></div>${l.label}`;
    legend.appendChild(item);
  });
}
</script>
</body>
</html>
